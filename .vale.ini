StylesPath = vale/styles
MinAlertLevel = warning

Packages = write-good, alex, MDX
Vocab = Uwazi

[*.{md,mdx}]
BasedOnStyles = write-good, alex, readability, Uwazi

Vale.Spelling = NO
Vale.Terms = NO
Vale.Avoid = NO
Uwazi.Spelling = YES

write-good.Passive = warning
write-good.Weasel = warning
write-good.TooWordy = warning
alex.Condescending = warning

TokenIgnores = (✗[^\n]+)

[readability.GunningFog]
enabled = true

[readability.FleschReadingEase]
enabled = true

[readability.SMOG]
enabled = true

readability.FleschReadingEase = warning
readability.GunningFog = warning
readability.SMOG = warning

