StylesPath = vale/styles
MinAlertLevel = warning

Packages = MDX
Vocab = Uwazi

[*.{md,mdx}]
BasedOnStyles = Vale, Uwazi

Vale.Spelling = NO

TokenIgnores = (✗[^\n]+)|(https?://[^\s]+)
BlockIgnores = (?m)(^\|.+\|\n?)+

Uwazi.UwaziCase = error
Uwazi.ImageAltText = error
Uwazi.LinkText = error
Uwazi.OxfordComma = error
Uwazi.Spelling = error
Uwazi.UIVerbs = error
Uwazi.RequiredFrontmatter = NO

Uwazi.Contractions = warning
Uwazi.FleschReadingEase = warning
Uwazi.GunningFog = warning
Uwazi.HeadingPunctuation = warning
Uwazi.HeadingSentenceCase = warning
Uwazi.Idioms = warning
Uwazi.InclusiveLanguage = warning
Uwazi.OrdinalNumbers = warning
Uwazi.ParagraphLength = warning
Uwazi.Passive = warning
Uwazi.RespectfulTone = warning
Uwazi.SentenceLength = warning
Uwazi.SMOG = warning
Uwazi.SpelledOutNumbers = warning
Uwazi.Weasel = warning
Uwazi.WordSubstitutions = warning

[{docs,blog}/**/*.{md,mdx}]
Uwazi.RequiredFrontmatter = error
