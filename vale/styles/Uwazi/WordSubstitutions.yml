  '\bfacilitate\b': 'help'
  '\brequire\b': 'need'
  '\bsubsequent\b': 'next'
  '\bmodify\b': 'change'
  '\bimplement\b': 'set up'
  '\ballocate\b': 'assign'
  '\bcommence\b': 'start'
  '\bterminate\b': 'end'
  '\bproceed\b': 'go'
  '\bprior to\b': 'before'
  '\bin order to\b': 'to'
