extends: capitalization
message: "'%s' should use sentence-style capitalisation."
scope:
  - heading
  - text.frontmatter.title
threshold: 1.0
match: $sentence
indicators:
  - ':'
  - '.'
exceptions:
  - Uwazi
  - HURIDOCS
  - PDF
  - HTML
  - CSV
  - OCR
  - JSON
  - URL
  - API
  - GitHub
  - SMOG Grade
  - Gunning Fog Index
  - Flesch Reading Ease
