extends: substitution
message: "Use '%s' instead of '%s'."
ignorecase: true
action:
  name: replace
swap:
  '\bclick\b': 'select'
  '\bclicks\b': 'selects'
  '\bclicking\b': 'selecting'
  '\bclicked\b': 'selected'
  '\btap\b': 'select'
  '\btaps\b': 'selects'
  '\btapping\b': 'selecting'
  '\btapped\b': 'selected'
  '\bnavigate to\b': 'go to'
  '\bhit\b': 'press'
