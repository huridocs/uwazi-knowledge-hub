[global]
flavor = "mdx"
line-length = 80
# MD041: Docusaurus frontmatter (title) supplies the H1; rule misfires here.
# MD033: MDX uses JSX and HTML (figures, components) by design; inline HTML is expected.
disable = ["MD041", "MD033"]
exclude = [
    "vale/tests/fixtures",   # Exclude vale test md files
]

[MD004]
style = "dash"

[MD013]
line-length = 80
reflow = true
reflow-mode = "semantic-line-breaks"
code_blocks = false
tables = false

[MD049]
style = "asterisk"

[MD050]
style = "asterisk"

[MD046]
style = "fenced"

[MD048]
style = "backtick"