[global]
flavor = "mdx"
line-length = 80
# MD041: Docusaurus frontmatter (title) supplies the H1; rule misfires here.
disable = ["MD041"]

[MD004]
style = "dash"

[MD013]
line-length = 80
reflow = true
reflow-mode = "semantic-line-breaks"
