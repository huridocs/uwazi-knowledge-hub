name: CI

# Test PR: confirm the required `check` gates merging. Safe to revert.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run type-check

      - run: pipx install rumdl==0.2.22
      - run: npm run lint:md

      - name: Install Vale
        run: |
          curl -sfL \
            https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz \
            | sudo tar -xz -C /usr/local/bin vale

      - name: Vale prose lint
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          vale --minAlertLevel error docs blog

      - run: npm run build
